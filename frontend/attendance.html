<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Mark Attendance</h2>

    <video id="video" autoplay></video>

    <button onclick="captureAttendance()">Capture Attendance</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <img id="preview">

    <p id="message"></p>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

function getLocation() {
    return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject);
    });
}

async function captureAttendance() {
    const context = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    context.drawImage(video, 0, 0);

    const image = canvas.toDataURL('image/jpeg')
        .replace(/^data:image\/jpeg;base64,/, '');

    const location = await getLocation();

    const latitude = location.coords.latitude;
    const longitude = location.coords.longitude;console.log("Latitude:", latitude);
console.log("Longitude:", longitude);


    const response = await fetch(
        'https://tap0a0qze4.execute-api.ap-south-1.amazonaws.com/attendance',
        {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                image,
                latitude,
                longitude
            })
        }
    );

    const data = await response.json();

   document.getElementById('message').style.color = '#4ade80';

document.getElementById('message').innerText =
    data.message || data.error;
}
</script>

</body>
</html>
