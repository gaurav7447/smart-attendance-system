<!DOCTYPE html>
<html>

<head>
    <title>Attendance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container dashboard-container">

    <h2>Attendance Dashboard</h2>

   <div style="overflow-x:auto; margin-top:20px;">

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Profession</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Location</th>
                </tr>
            </thead>

            <tbody id="attendanceTable"></tbody>

        </table>

    </div>

</div>

<script>

async function loadAttendance() {

    try {

        const response = await fetch(
            'https://tap0a0qze4.execute-api.ap-south-1.amazonaws.com/records'
        );

        const data = await response.json();

        console.log(data);

        const table = document.getElementById('attendanceTable');

        table.innerHTML = '';

        data.forEach(item => {

            const row = `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.profession}</td>
                    <td>${item.date}</td>
                    <td>${item.time}</td>
                    <td>${item.status}</td>
                    <td>${item.location}</td>
                </tr>
            `;

            table.innerHTML += row;
        });

    } catch(error) {

        console.log(error);

        alert('Failed to fetch attendance record');
    }
}

loadAttendance();

</script>

</body>

</html>
